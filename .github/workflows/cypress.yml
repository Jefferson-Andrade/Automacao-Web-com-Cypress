name: Testes E2E com Cypress

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Instalar dependencias e rodar os testes
        uses: cypress-io/github-action@v6
        with:
          browser: chrome

      - name: Guardar relatorio Mochawesome
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-mochawesome
          path: cypress/reports
          retention-days: 7

      - name: Guardar screenshots (quando um teste falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: cypress/screenshots
          retention-days: 7

      - name: Guardar videos dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: cypress/videos
          retention-days: 7
